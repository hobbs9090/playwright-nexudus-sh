name: Playwright Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    paths-ignore:
      - README.md
  pull_request:
    paths-ignore:
      - README.md
  workflow_dispatch:

jobs:
  plan-playwright:
    name: Plan Playwright runner fan-out
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      execution_budget_minutes: ${{ steps.matrix.outputs.execution_budget_minutes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      target_minutes: ${{ steps.matrix.outputs.target_minutes }}
      total_runners: ${{ steps.matrix.outputs.total_runners }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build Playwright shard matrix
        id: matrix
        env:
          PLAYWRIGHT_CI_API_SERIAL_MINUTES: ${{ vars.PLAYWRIGHT_CI_API_SERIAL_MINUTES }}
          PLAYWRIGHT_CI_API_SHARDS: ${{ vars.PLAYWRIGHT_CI_API_SHARDS }}
          PLAYWRIGHT_CI_AP_SERIAL_MINUTES: ${{ vars.PLAYWRIGHT_CI_AP_SERIAL_MINUTES }}
          PLAYWRIGHT_CI_AP_SHARDS: ${{ vars.PLAYWRIGHT_CI_AP_SHARDS }}
          PLAYWRIGHT_CI_FIXED_OVERHEAD_MINUTES: ${{ vars.PLAYWRIGHT_CI_FIXED_OVERHEAD_MINUTES }}
          PLAYWRIGHT_CI_MAX_SHARDS_PER_PROJECT: ${{ vars.PLAYWRIGHT_CI_MAX_SHARDS_PER_PROJECT }}
          PLAYWRIGHT_CI_MP_SERIAL_MINUTES: ${{ vars.PLAYWRIGHT_CI_MP_SERIAL_MINUTES }}
          PLAYWRIGHT_CI_MP_SHARDS: ${{ vars.PLAYWRIGHT_CI_MP_SHARDS }}
          PLAYWRIGHT_CI_TARGET_MINUTES: ${{ vars.PLAYWRIGHT_CI_TARGET_MINUTES }}
        run: |
          if [ "${{ github.ref_name }}" = "demo" ] || [ "${{ github.head_ref }}" = "demo" ]; then
            printf '%s\n' \
              'execution_budget_minutes=1' \
              'target_minutes=1' \
              'total_runners=1' \
              'matrix=[{"project":"MP Staging Chromium","project_slug":"mp","shard_index":1,"shard_total":1,"test_target":"tests/mp/mp-help-requests.spec.ts"}]' \
              >> "$GITHUB_OUTPUT"
          else
            node scripts/build-playwright-ci-matrix.mjs >> "$GITHUB_OUTPUT"
          fi

  playwright:
    name: Run Playwright tests (${{ matrix.project_slug }} ${{ matrix.shard_index }}/${{ matrix.shard_total }})
    needs: plan-playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan-playwright.outputs.matrix) }}
    env:
      CI: true
      PLAYWRIGHT_HEADLESS: true
      NEXUDUS_AP_BASE_URL: ${{ vars.NEXUDUS_AP_BASE_URL }}
      NEXUDUS_AP_EMAIL: ${{ secrets.NEXUDUS_AP_EMAIL }}
      NEXUDUS_AP_PASSWORD: ${{ secrets.NEXUDUS_AP_PASSWORD }}
      NEXUDUS_MP_BASE_URL: ${{ vars.NEXUDUS_MP_BASE_URL }}
      NEXUDUS_MP_EMAIL: ${{ secrets.NEXUDUS_MP_EMAIL }}
      NEXUDUS_MP_PASSWORD: ${{ secrets.NEXUDUS_MP_PASSWORD }}
      NEXUDUS_API_BASE_URL: ${{ vars.NEXUDUS_API_BASE_URL }}
      NEXUDUS_API_USERNAME: ${{ secrets.NEXUDUS_API_USERNAME }}
      NEXUDUS_API_PASSWORD: ${{ secrets.NEXUDUS_API_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          if [ -n "${{ matrix.test_target }}" ]; then
            npx playwright test "${{ matrix.test_target }}" --project "${{ matrix.project }}" --reporter=blob
          else
            npx playwright test --project "${{ matrix.project }}" --shard="${{ matrix.shard_index }}/${{ matrix.shard_total }}" --reporter=blob
          fi

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-blob-report-${{ matrix.project_slug }}-${{ matrix.shard_index }}-of-${{ matrix.shard_total }}
          path: blob-report/
          retention-days: 14

  report:
    name: Merge Playwright reports
    if: always() && needs.playwright.result != 'cancelled'
    needs:
      - plan-playwright
      - playwright
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: playwright-blob-report*
          path: all-blob-reports
          merge-multiple: true

      - name: Ensure merged Playwright result directories exist
        run: mkdir -p playwright-report test-results

      - name: Merge Playwright HTML report
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Merge Playwright JUnit report
        run: npx playwright merge-reports --reporter=junit ./all-blob-reports > test-results/results.xml

      - name: Ensure Playwright report directory exists
        if: always()
        run: |
          if [ ! -f playwright-report/index.html ]; then
            mkdir -p playwright-report
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '  <head>' \
              '    <meta charset="utf-8" />' \
              '    <title>Playwright report unavailable</title>' \
              '  </head>' \
              '  <body>' \
              '    <h1>Playwright report unavailable</h1>' \
              '    <p>The Playwright HTML report was not generated for this run.</p>' \
              '  </body>' \
              '</html>' \
              > playwright-report/index.html
          fi

      - name: Add Playwright summary to GitHub UI
        if: always()
        env:
          PLAYWRIGHT_CI_EXECUTION_BUDGET_MINUTES: ${{ needs.plan-playwright.outputs.execution_budget_minutes }}
          PLAYWRIGHT_CI_TARGET_MINUTES: ${{ needs.plan-playwright.outputs.target_minutes }}
          PLAYWRIGHT_CI_TOTAL_RUNNERS: ${{ needs.plan-playwright.outputs.total_runners }}
          PLAYWRIGHT_JUNIT_PATH: test-results/results.xml
        run: node scripts/write-github-summary.mjs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  lighthouse:
    name: Run Lighthouse audits
    if: github.ref_name != 'demo' && github.head_ref != 'demo'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CI: true
      PLAYWRIGHT_HEADLESS: true
      NEXUDUS_AP_BASE_URL: ${{ vars.NEXUDUS_AP_BASE_URL }}
      NEXUDUS_AP_EMAIL: ${{ secrets.NEXUDUS_AP_EMAIL }}
      NEXUDUS_AP_PASSWORD: ${{ secrets.NEXUDUS_AP_PASSWORD }}
      NEXUDUS_MP_BASE_URL: ${{ vars.NEXUDUS_MP_BASE_URL }}
      NEXUDUS_MP_EMAIL: ${{ secrets.NEXUDUS_MP_EMAIL }}
      NEXUDUS_MP_PASSWORD: ${{ secrets.NEXUDUS_MP_PASSWORD }}
      LIGHTHOUSE_MIN_PERFORMANCE: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Lighthouse audits
        run: npm run test:lighthouse

      - name: Build Lighthouse report bundle
        if: always()
        run: node scripts/build-lighthouse-report-index.mjs

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-html-report
          path: lighthouse-report/
          retention-days: 14

      - name: Upload Lighthouse test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-test-results
          path: test-results/lighthouse/
          retention-days: 14
          if-no-files-found: warn

  deploy-report:
    name: Publish CI reports
    if: always() && github.event_name != 'pull_request' && github.ref_name != 'demo' && github.head_ref != 'demo' && needs.report.result != 'cancelled' && needs.lighthouse.result != 'cancelled'
    needs:
      - report
      - lighthouse
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download Playwright report artifact
        uses: actions/download-artifact@v8
        with:
          name: playwright-report
          path: playwright-report

      - name: Download Lighthouse report artifact
        uses: actions/download-artifact@v8
        with:
          name: lighthouse-html-report
          path: lighthouse-report

      - name: Build published CI report site
        run: node scripts/build-pages-report-site.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-report

      - name: Deploy reports to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add published report links to GitHub UI
        run: |
          base_url="${{ steps.deployment.outputs.page_url }}"
          case "$base_url" in
            */) ;;
            *) base_url="${base_url}/" ;;
          esac

          {
            echo '## Published Reports'
            echo
            echo "Reports index: [Open CI reports](${base_url})"
            echo "Playwright report: [Open Playwright report](${base_url}playwright/)"
            echo "Lighthouse report: [Open Lighthouse report](${base_url}lighthouse/)"
          } >> "$GITHUB_STEP_SUMMARY"
