name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CI: true
      PLAYWRIGHT_HEADLESS: true
      NEXUDUS_BASE_URL: ${{ vars.NEXUDUS_BASE_URL }}
      NEXUDUS_EMAIL: ${{ secrets.NEXUDUS_EMAIL }}
      NEXUDUS_PASSWORD: ${{ secrets.NEXUDUS_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: playwright
        run: npm test

      - name: Ensure Playwright report directory exists
        if: always()
        run: |
          if [ ! -f playwright-report/index.html ]; then
            mkdir -p playwright-report
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '  <head>' \
              '    <meta charset="utf-8" />' \
              '    <title>Playwright report unavailable</title>' \
              '  </head>' \
              '  <body>' \
              '    <h1>Playwright report unavailable</h1>' \
              '    <p>The Playwright HTML report was not generated for this run.</p>' \
              '  </body>' \
              '</html>' \
              > playwright-report/index.html
          fi

      - name: Add Playwright summary to GitHub UI
        if: always()
        env:
          PLAYWRIGHT_JUNIT_PATH: test-results/results.xml
        run: node scripts/write-github-summary.mjs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  deploy-report:
    name: Publish Playwright report
    if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.test.result != 'cancelled' && vars.PLAYWRIGHT_PUBLISH_REPORT == 'true'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: playwright-report

      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add published report link to GitHub UI
        env:
          PLAYWRIGHT_REPORT_URL: ${{ steps.deployment.outputs.page_url }}
        run: node scripts/write-github-summary.mjs
