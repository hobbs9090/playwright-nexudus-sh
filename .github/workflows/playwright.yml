name: Lighthouse Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    paths-ignore:
      - README.md
  pull_request:
    paths-ignore:
      - README.md
  workflow_dispatch:

jobs:
  lighthouse:
    name: Run Lighthouse audits
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CI: true
      PLAYWRIGHT_HEADLESS: true
      NEXUDUS_AP_BASE_URL: ${{ vars.NEXUDUS_AP_BASE_URL }}
      NEXUDUS_AP_EMAIL: ${{ secrets.NEXUDUS_AP_EMAIL }}
      NEXUDUS_AP_PASSWORD: ${{ secrets.NEXUDUS_AP_PASSWORD }}
      NEXUDUS_MP_BASE_URL: ${{ vars.NEXUDUS_MP_BASE_URL }}
      NEXUDUS_MP_EMAIL: ${{ secrets.NEXUDUS_MP_EMAIL }}
      NEXUDUS_MP_PASSWORD: ${{ secrets.NEXUDUS_MP_PASSWORD }}
      LIGHTHOUSE_MIN_PERFORMANCE: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Lighthouse audits
        run: npm run test:lighthouse

      - name: Ensure Lighthouse report directory exists
        if: always()
        run: |
          if [ ! -f playwright-report/lighthouse/index.html ]; then
            mkdir -p playwright-report/lighthouse
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '  <head>' \
              '    <meta charset="utf-8" />' \
              '    <title>Lighthouse report unavailable</title>' \
              '  </head>' \
              '  <body>' \
              '    <h1>Lighthouse report unavailable</h1>' \
              '    <p>The Lighthouse Playwright HTML report was not generated for this run.</p>' \
              '  </body>' \
              '</html>' \
              > playwright-report/lighthouse/index.html
          fi

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-playwright-report
          path: playwright-report/lighthouse/
          retention-days: 14

      - name: Upload Lighthouse test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-test-results
          path: test-results/lighthouse/
          retention-days: 14
          if-no-files-found: warn
