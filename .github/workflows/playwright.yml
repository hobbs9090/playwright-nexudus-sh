name: Lighthouse Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    paths-ignore:
      - README.md
  pull_request:
    paths-ignore:
      - README.md
  workflow_dispatch:

jobs:
  lighthouse:
    name: Run Lighthouse audits
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CI: true
      PLAYWRIGHT_HEADLESS: true
      NEXUDUS_AP_BASE_URL: ${{ vars.NEXUDUS_AP_BASE_URL }}
      NEXUDUS_AP_EMAIL: ${{ secrets.NEXUDUS_AP_EMAIL }}
      NEXUDUS_AP_PASSWORD: ${{ secrets.NEXUDUS_AP_PASSWORD }}
      NEXUDUS_MP_BASE_URL: ${{ vars.NEXUDUS_MP_BASE_URL }}
      NEXUDUS_MP_EMAIL: ${{ secrets.NEXUDUS_MP_EMAIL }}
      NEXUDUS_MP_PASSWORD: ${{ secrets.NEXUDUS_MP_PASSWORD }}
      LIGHTHOUSE_MIN_PERFORMANCE: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Lighthouse audits
        run: npm run test:lighthouse

      - name: Build Lighthouse report bundle
        if: always()
        run: node scripts/build-lighthouse-report-index.mjs

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-html-report
          path: lighthouse-report/
          retention-days: 14

      - name: Upload Lighthouse test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-test-results
          path: test-results/lighthouse/
          retention-days: 14
          if-no-files-found: warn

  deploy-report:
    name: Publish Lighthouse report
    if: always() && github.event_name != 'pull_request' && needs.lighthouse.result != 'cancelled'
    needs: lighthouse
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Lighthouse report artifact
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-html-report
          path: lighthouse-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: lighthouse-report

      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add published report link to GitHub UI
        run: |
          {
            echo '## Lighthouse Report'
            echo
            echo "Published HTML report: [Open Lighthouse report](${{ steps.deployment.outputs.page_url }})"
          } >> "$GITHUB_STEP_SUMMARY"
