name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  playwright:
    name: Run Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CI: true
      PLAYWRIGHT_HEADLESS: true
      NEXUDUS_AP_BASE_URL: ${{ vars.NEXUDUS_AP_BASE_URL }}
      NEXUDUS_AP_EMAIL: ${{ secrets.NEXUDUS_AP_EMAIL }}
      NEXUDUS_AP_PASSWORD: ${{ secrets.NEXUDUS_AP_PASSWORD }}
      NEXUDUS_MP_BASE_URL: ${{ vars.NEXUDUS_MP_BASE_URL }}
      NEXUDUS_MP_EMAIL: ${{ secrets.NEXUDUS_MP_EMAIL }}
      NEXUDUS_MP_PASSWORD: ${{ secrets.NEXUDUS_MP_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=blob --grep @smoke

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report
          path: blob-report/
          retention-days: 14

  k6:
    name: Run k6 smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CI: true
      PLAYWRIGHT_HEADLESS: true
      NEXUDUS_AP_BASE_URL: ${{ vars.NEXUDUS_AP_BASE_URL }}
      NEXUDUS_AP_EMAIL: ${{ secrets.NEXUDUS_AP_EMAIL }}
      NEXUDUS_AP_PASSWORD: ${{ secrets.NEXUDUS_AP_PASSWORD }}
      NEXUDUS_MP_BASE_URL: ${{ vars.NEXUDUS_MP_BASE_URL }}
      NEXUDUS_MP_EMAIL: ${{ secrets.NEXUDUS_MP_EMAIL }}
      NEXUDUS_MP_PASSWORD: ${{ secrets.NEXUDUS_MP_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Resolve Playwright Chromium path for k6 browser tests
        id: chromium
        run: |
          chromium_path=$(node -p "require('playwright').chromium.executablePath()")
          echo "path=${chromium_path}" >> "$GITHUB_OUTPUT"

      - name: Run k6 landing page smoke test
        run: npm run perf:smoke -- --vus 1 --duration 10s

      - name: Run k6 authenticated login smoke test
        if: github.event_name == 'workflow_dispatch' && vars.RUN_K6_BROWSER_LOGIN == 'true'
        env:
          K6_BROWSER_EXECUTABLE_PATH: ${{ steps.chromium.outputs.path }}
          K6_BROWSER_HEADLESS: "true"
        run: npm run perf:login

  report:
    name: Merge Playwright reports
    if: always() && needs.playwright.result != 'cancelled'
    needs: playwright
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-report*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter=html,junit ./all-blob-reports

      - name: Ensure Playwright report directory exists
        if: always()
        run: |
          if [ ! -f playwright-report/index.html ]; then
            mkdir -p playwright-report
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '  <head>' \
              '    <meta charset="utf-8" />' \
              '    <title>Playwright report unavailable</title>' \
              '  </head>' \
              '  <body>' \
              '    <h1>Playwright report unavailable</h1>' \
              '    <p>The Playwright HTML report was not generated for this run.</p>' \
              '  </body>' \
              '</html>' \
              > playwright-report/index.html
          fi

      - name: Add Playwright summary to GitHub UI
        if: always()
        env:
          PLAYWRIGHT_JUNIT_PATH: test-results/results.xml
        run: node scripts/write-github-summary.mjs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  deploy-report:
    name: Publish Playwright report
    if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.report.result != 'cancelled'
    needs: report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: playwright-report

      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add published report link to GitHub UI
        env:
          PLAYWRIGHT_REPORT_URL: ${{ steps.deployment.outputs.page_url }}
        run: node scripts/write-github-summary.mjs
