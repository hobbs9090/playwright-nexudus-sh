version: 2.1

jobs:
  playwright-tests:
    docker:
      - image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_directory: ~/project
    environment:
      CI: "true"
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_HTML_OPEN: "never"
    steps:
      - checkout
      - run:
          name: Validate required environment variables
          command: |
            for var in NEXUDUS_EMAIL NEXUDUS_PASSWORD; do
              if [ -z "${!var}" ]; then
                echo "Missing required CircleCI environment variable: ${var}"
                exit 1
              fi
            done
            echo "Required CircleCI environment variables are present."
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Run Playwright tests
          command: npm test
          no_output_timeout: 10m
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
      - store_artifacts:
          path: test-results
          destination: test-results

workflows:
  playwright:
    jobs:
      - playwright-tests:
          filters:
            branches:
              only: /.*/
            tags:
              ignore: /.*/
